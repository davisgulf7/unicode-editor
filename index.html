<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/unicode-editor/vite.svg" />
  <link rel="apple-touch-icon" href="/unicode-editor/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="description" content="A progressive web app for Unicode Antigravity" />
  <title>GulfStudios Unicode Editor</title>
  <script type="module" crossorigin src="/unicode-editor/assets/index-NEQcrYC2.js"></script>
  <link rel="stylesheet" crossorigin href="/unicode-editor/assets/index-CwqRJb5E.css">
<link rel="manifest" href="/unicode-editor/manifest.webmanifest"></head>

<body>
  <div id="app" class="liquid-container">
    <header class="glass-header">
      <h1>GulfStudios Unicode Composer</h1>
      <button id="btn-copy" class="btn-primary" aria-label="Copy to clipboard">
        <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-copy">
          <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
        </svg>
        <span class="copy-text">Copy</span>
      </button>
    </header>

    <main class="editor-container glass-panel">
      <div class="toolbar glass-toolbar" role="toolbar" aria-label="Text Formatting">

        <div class="toolbar-group">
          <button class="tool-btn" data-style="bold" aria-label="Bold (Mathematical Sans-Serif)">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 12a4 4 0 0 0 0-8H6v8" />
              <path d="M15 20a4 4 0 0 0 0-8H6v8Z" />
            </svg>
          </button>
          <button class="tool-btn" data-style="italic" aria-label="Italic (Mathematical Sans-Serif)">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" x2="10" y1="4" y2="4" />
              <line x1="14" x2="5" y1="20" y2="20" />
              <line x1="15" x2="9" y1="4" y2="20" />
            </svg>
          </button>
          <button class="tool-btn" data-style="boldItalic" aria-label="Bold Italic">
            <span class="icon-text" style="font-style: italic; font-weight: bold;">BI</span>
          </button>
          <button class="tool-btn" data-style="underline" aria-label="Underline (Combining Mark)">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 4v6a6 6 0 0 0 12 0V4" />
              <line x1="4" x2="20" y1="20" y2="20" />
            </svg>
          </button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group">
          <button class="tool-btn" data-style="mono" aria-label="Monospace">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
          </button>
          <button class="tool-btn" data-style="serifBold" aria-label="Serif Bold">
            <span class="icon-text" style="font-family: serif; font-weight: bold;">S</span>
          </button>
          <button class="tool-btn" data-style="script" aria-label="Script">
            <span class="icon-text" style="font-family: cursive;">Script</span>
          </button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group">
          <button class="tool-btn" data-list="bullet" aria-label="Bullet List">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" x2="21" y1="6" y2="6" />
              <line x1="8" x2="21" y1="12" y2="12" />
              <line x1="8" x2="21" y1="18" y2="18" />
              <line x1="3" x2="3.01" y1="6" y2="6" />
              <line x1="3" x2="3.01" y1="12" y2="12" />
              <line x1="3" x2="3.01" y1="18" y2="18" />
            </svg>
          </button>
          <button class="tool-btn" data-list="number" aria-label="Numbered List">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 6h11" />
              <path d="M10 12h11" />
              <path d="M10 18h11" />
              <path d="M4 6h1v4" />
              <path d="M4 10h2" />
              <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" />
            </svg>
          </button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group">
          <button class="tool-btn clear-btn" data-style="clear" aria-label="Clear All Formatting">
            <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l18 18" />
              <path d="M16 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v2" />
              <path d="M10 20v-6" />
            </svg>
          </button>
        </div>

      </div>

      <div id="editor" class="editor-area" contenteditable="true" aria-multiline="true" role="textbox"
        aria-label="Text Editor"></div>

      <div id="toast" class="toast hidden">Copied to clipboard!</div>
    </main>
  </div>

  <div class="background-blobs">
    <div class="blob top-left"></div>
    <div class="blob bottom-right"></div>
  </div>

</body>

</html>
